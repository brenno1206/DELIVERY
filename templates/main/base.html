<!DOCTYPE html>
<html lang="pt-BR">
<head>
    {% block head %}
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Delivery UVV{% endblock %}</title>
        {% block css %} {% endblock %}
    {% endblock %}
</head>
<body>
    <header>
        <nav>
            {% block navbar %}
              {% include 'main/partials/navbar.html'   %}
            {% endblock %}
        </nav>
    </header>
    <main>
        {% block content %}
            <!-- Conteudo Principal que será renderizado-->
        {% endblock %}
    </main>
    <footer>
        {% block footer %}
           {% include 'main/partials/footer.html'   %}
        {% endblock %}
    </footer>
</body>
</html>
