<!DOCTYPE html>
<html lang="pt-BR">
<head>
    {% block head %}
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Delivery UVV{% endblock %}</title>
        {% block css %}
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
        <link rel="stylesheet" href="/static/css/style.css">
        {% endblock %}
        
    {% endblock %}
</head>
<body>
    <div class="page">
        <header>
            {% block navbar %}
                {% include 'main/partials/navbar.html'   %}
            {% endblock %}
        </header>
        <main class="main-content">
            {% block content %}
                <!-- Conteudo Principal que será renderizado-->
            {% endblock %}
        </main>
        <footer class="footer">
            {% block footer %}
                {% include 'main/partials/footer.html'   %}
            {% endblock %}
        </footer>
    </div>
</body>
</html>
